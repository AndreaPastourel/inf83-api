name: CI - inf83 API

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Tag Docker à déployer en production, ex: sha-a1b2c3 ou v1.0.0"
        required: true
        type: string
jobs:
  test:
    name: Tests Jest
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Lancer les tests Jest
        run: npm test

  build-and-push:
    name: Build et push Docker
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Se connecter à Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Préparer Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build et push de l'image Docker
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/inf83-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/inf83-api:${{ github.sha }}

  deploy-staging:
    name: Déploiement staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging

    env:
      IMAGE_TAG: ${{ github.sha }}
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/inf83-api
      VPS_PORT: ${{ secrets.VPS_PORT }}

    steps:
      - name: Préparer la clé SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$VPS_PORT" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Déployer sur staging
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "$VPS_PORT" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
            cd /opt/inf83-api/staging &&
            sed -i 's|^DOCKER_IMAGE=.*|DOCKER_IMAGE=${IMAGE_NAME}:${IMAGE_TAG}|' .env &&
            docker compose pull &&
            docker compose up -d &&
            docker compose ps
          "
  deploy-production:
    name: Déploiement production
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: production

    env:
      IMAGE_TAG: ${{ github.event.inputs.image_tag }}
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/inf83-api
      VPS_PORT: ${{ secrets.VPS_PORT }}

    steps:
      - name: Préparer la clé SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$VPS_PORT" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Déployer sur production
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "$VPS_PORT" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "
            cd /opt/inf83-api/production &&
            sed -i 's|^DOCKER_IMAGE=.*|DOCKER_IMAGE=${IMAGE_NAME}:${IMAGE_TAG}|' .env &&
            docker compose pull &&
            docker compose up -d &&
            docker compose ps
          "