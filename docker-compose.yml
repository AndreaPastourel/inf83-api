services:
  db:
    image: postgres:16-alpine
    container_name: exercice-db
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
      POSTGRES_DB: exercice_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d exercice_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: exercice-api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://app_user:app_password@db:5432/exercice_db
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: